# Polymarket News Bot — Default Configuration
# Override per environment with a separate YAML or .env

polymarket:
  api_key: ""
  secret: ""
  wallet_private_key: ""
  chain_id: 137
  base_url: "https://clob.polymarket.com"
  gamma_url: "https://gamma-api.polymarket.com"

news:
  newsapi_key: ""
  poll_interval_seconds: 30
  max_age_minutes: 15
  sources:
    rss:
      enabled: true
      feeds:
        - name: "Reuters World"
          url: "https://feeds.reuters.com/reuters/worldNews"
          tier: 2
        - name: "CoinDesk"
          url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
          tier: 2
    newsapi:
      enabled: false
      categories: ["business", "technology", "politics"]
      language: "en"

  source_tiers:
    tier_1_reliability: 0.95
    tier_2_reliability: 0.80
    tier_3_reliability: 0.55
    tier_4_reliability: 0.25

filter:
  min_relevance_score: 0.5
  max_age_minutes: 15
  keywords_whitelist: []
  keywords_blacklist: []
  categories:
    - "crypto"
    - "politics"
    - "economics"
    - "regulation"
    - "central_banks"

mapping:
  min_mapping_confidence: 0.45
  min_liquidity_score: 0.05
  max_markets_per_event: 3

resolution:
  min_understanding_confidence: 0.7

probability:
  method: "hybrid"       # rule_based | llm | hybrid
  min_confidence: 0.4

ai:
  openai_api_key: ""
  model: "gpt-4o-mini"
  max_tokens: 500
  temperature: 0.2
  timeout_seconds: 15
  max_retries: 2

edge:
  fee_rate: 0.02
  slippage_estimate: 0.01
  uncertainty_penalty_weight: 0.5
  bands:
    - name: "strong"
      min_raw_edge: 0.08
      min_net_edge: 0.05
      size_scale: 1.0
      log_only: false
    - name: "normal"
      min_raw_edge: 0.05
      min_net_edge: 0.03
      size_scale: 0.7
      log_only: false
    - name: "observe"
      min_raw_edge: 0.03
      min_net_edge: 0.00
      size_scale: 0.0
      log_only: true

execution:
  dry_run: true
  order_type: "limit"
  max_retry: 3
  timeout_seconds: 10

risk:
  # Fase A — conservative first-live (quant review)
  max_position_pct: 0.01        # 1% of capital per trade
  max_cluster_pct: 0.03         # 3% per event cluster
  max_total_exposure_pct: 0.10  # 10% total
  min_source_tier: 3            # don't trade on tier 4 alone
  min_confidence: 0.5
  max_spread: 0.10
  max_daily_loss_pct: 0.025     # 2.5% daily loss stop
  equity_kill_switch_pct: 0.10  # 10% drawdown kill switch
  event_cooldown_minutes: 30    # no re-entry same event within 30min

monitor:
  check_interval_seconds: 60
  thesis_recheck_on_new_news: true
  take_profit_edge_absorbed: 0.7
  force_exit_thesis_invalid: true
  time_exit_hours: 72

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: "logs/newsbot.log"

audit:
  log_decisions: true
  log_dir: "logs/decisions"
  replay_enabled: false
